name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            llvm \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libelf-dev \
            zlib1g-dev \
            libbpf-dev \
            bpftool

      - name: Show versions
        run: |
          uname -a
          clang --version
          bpftool version

      - name: Build
        run: make

      - name: List build output
        run: |
          find . -maxdepth 2 -type f

      # Ganti path ini sesuai hasil build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            my_binary

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            my_binary
