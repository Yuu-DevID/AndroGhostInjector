name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            llvm \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libelf-dev \
            zlib1g-dev \
            libbpf-dev \
            curl

      - name: Download bpftool
        run: |
          curl -L https://github.com/libbpf/bpftool/releases/download/v7.4.0/bpftool-v7.4.0-amd64.tar.gz \
            | tar -xz
          chmod +x bpftool
          sudo mv bpftool /usr/local/bin/

      - name: Verify bpftool
        run: |
          which bpftool
          bpftool version

      - name: Build
        run: make
