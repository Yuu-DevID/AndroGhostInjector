name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bpftool
        run: |
          curl -L https://github.com/libbpf/bpftool/releases/download/v7.4.0/bpftool-v7.4.0-amd64.tar.gz \
            | tar -xz
          chmod +x bpftool
          mv bpftool bpftool_bin
          ls -lah bpftool_bin

      - name: Build Docker image
        run: |
          docker build -t injector-builder .

      - name: Build project
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            injector-builder \
            make

      - name: Show output
        run: |
          ls -lah
          file injector || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: injector
          path: injector

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: injector
